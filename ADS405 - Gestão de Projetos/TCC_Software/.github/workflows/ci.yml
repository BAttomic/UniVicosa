name: CI

# Esteira de qualidade: roda a cada push/PR. O Easypanel cuida do build da
# imagem Docker e do deploy; aqui garantimos que tipos, lint e testes passam.
on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
