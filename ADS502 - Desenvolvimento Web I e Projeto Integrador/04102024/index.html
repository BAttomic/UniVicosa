<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botão Aleatório Retrowave</title>
<style>
    body {
        background-color: #000;
        font-family: 'Roboto', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    #randomButton {
        background-color: #00ff00; /* Cor verde */
        color: #fff;
        border: none;
        border-radius: 25px;
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 0px 0px 10px rgba(0, 255, 0, 0.7); /* Sombras em verde */
        transition: all 0.3s ease;
        position: absolute;
    }

    #randomButton:hover {
        background-color: #00ccff;
        box-shadow: 0px 0px 20px rgba(0, 204, 255, 0.7);
    }
</style>
</head>
<body>
<button id="randomButton">Passe o mouse aqui</button>
<script>
    document.getElementById('randomButton').addEventListener('mouseover', function() {
        var randomX = Math.random() * (window.innerWidth - this.offsetWidth);
        var randomY = Math.random() * (window.innerHeight - this.offsetHeight);
        
        this.style.left = randomX + 'px';
        this.style.top = randomY + 'px';
    });
</script>
</body>
</html>
